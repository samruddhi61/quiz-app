<!DOCTYPE html>
<html>
<head>
  <title>Advanced Quiz App</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #334155;
      padding: 20px;
      border-radius: 15px;
    }

    .option {
      background: #475569;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .option:hover { background: #64748b; }

    .correct { background: green; }
    .wrong { background: red; }

    button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
    }

    .progress {
      height: 10px;
      background: #475569;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 10px;
      background: #22c55e;
      width: 0%;
    }
  </style>
</head>

<body>

<h1>🧠 Topic-Based Quiz App</h1>

<div class="container">

<select id="topicSelect">
  <option value="html">HTML Quiz</option>
  <option value="css">CSS Quiz</option>
  <option value="js">JavaScript Quiz</option>
</select>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quizBox"></div>

</div>

<script>

const data = {
  html: [
    { q: "HTML stands for?", o: ["Hyper Text Markup Language","High Tech","Home Tool","None"], a: 0 },
    { q: "Tag for paragraph?", o: ["p","h1","div","span"], a: 0 }
  ],
  css: [
    { q: "CSS used for?", o: ["Styling","Logic","DB","None"], a: 0 },
    { q: "Color property?", o: ["color","bg","style","font"], a: 0 }
  ],
  js: [
    { q: "JS is?", o: ["Language","DB","Tool","None"], a: 0 },
    { q: "Function keyword?", o: ["func","function","def","method"], a: 1 }
  ]
};

let quiz = [];
let index = 0;
let score = 0;

function startQuiz() {
  const topic = document.getElementById("topicSelect").value;
  quiz = data[topic];
  index = 0;
  score = 0;
  loadQuestion();
}

function loadQuestion() {
  let q = quiz[index];

  let html = `
    <div class="progress">
      <div class="progress-bar" style="width:${((index+1)/quiz.length)*100}%"></div>
    </div>
    <h2>${q.q}</h2>
  `;

  q.o.forEach((opt,i)=>{
    html += `<div class="option" onclick="selectAnswer(${i},this)">${opt}</div>`;
  });

  html += `<button onclick="next()">Next</button>`;

  document.getElementById("quizBox").innerHTML = html;
}

function selectAnswer(i,el) {
  let correct = quiz[index].a;
  let options = document.querySelectorAll(".option");

  options.forEach(o=>o.onclick=null);

  if(i===correct){
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    options[correct].classList.add("correct");
  }
}

function next() {
  index++;
  if(index>=quiz.length){
    document.getElementById("quizBox").innerHTML = `
      <h2>Finished 🎉</h2>
      <p>Score: ${score}/${quiz.length}</p>
    `;
    return;
  }
  loadQuestion();
}

</script>

</body>
</html>
