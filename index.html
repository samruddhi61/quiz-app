<!DOCTYPE html>
<html>
<head>
  <title>Smart Multi-Topic Quiz</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 550px;
      margin: auto;
      background: #334155;
      padding: 20px;
      border-radius: 15px;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .option {
      background: #475569;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .option:hover { background: #64748b; }

    .correct { background: green; }
    .wrong { background: red; }

    .progress {
      height: 10px;
      background: #475569;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .progress-bar {
      height: 10px;
      background: #22c55e;
      width: 0%;
      border-radius: 5px;
    }

    .timer {
      color: #facc15;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>🧠 Smart Quiz App</h1>

<div class="container">

<select id="topicSelect">
  <option value="cpp">C++</option>
  <option value="java">Java</option>
  <option value="python">Python</option>
  <option value="fe">Feature Engineering</option>
  <option value="iiot">IIoT</option>
  <option value="math">Mathematics</option>
</select>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quizBox"></div>

</div>

<script>

const data = {

cpp: [
{q:"C++ is?",o:["OS","DB","Programming Language","Tool"],a:2},
{q:"Header file?",o:["math","iostream","stdio","conio"],a:1},
{q:"Output function?",o:["print","cout","echo","display"],a:1},
{q:"Input function?",o:["read","cin","scan","input"],a:1},
{q:"OOP concept?",o:["Styling","Encapsulation","Design","DB"],a:1}
],

java: [
{q:"Java is?",o:["DB","Language","Tool","OS"],a:1},
{q:"Java is?",o:["Platform Dependent","Platform Independent","None","Both"],a:1},
{q:"Main function?",o:["start()","main()","run()","init()"],a:1},
{q:"Keyword for class?",o:["struct","define","class","object"],a:2},
{q:"Java runs on?",o:["CPU","GPU","JVM","RAM"],a:2}
],

python: [
{q:"Python is?",o:["Tool","Language","DB","OS"],a:1},
{q:"Print function?",o:["show()","display()","print()","echo()"],a:2},
{q:"Python is?",o:["Compiled","Interpreted","Both","None"],a:1},
{q:"File extension?",o:[".java",".txt",".cpp",".py"],a:3},
{q:"Data type?",o:["None","int","float","All"],a:3}
],

fe: [
{q:"Feature Engineering means?",o:["Coding","Data preprocessing","Styling","Testing"],a:1},
{q:"Normalization is?",o:["Cleaning","Scaling data","Deleting","Sorting"],a:1},
{q:"Encoding is used for?",o:["Numbers","Categorical data","Images","Audio"],a:1},
{q:"Feature selection?",o:["Deleting","Choosing important data","Sorting","Training"],a:1},
{q:"Outlier handling?",o:["Adding","Sorting","Removing extreme values","Encoding"],a:2}
],

iiot: [
{q:"IIoT stands for?",o:["Internet","Industrial IoT","Tool","Tech"],a:1},
{q:"Used in?",o:["Games","Industries","Movies","Music"],a:1},
{q:"Sensor does?",o:["Delete","Store","Collect data","Process"],a:2},
{q:"Example?",o:["Phone","Smart factory","Laptop","TV"],a:1},
{q:"Purpose?",o:["Gaming","Automation","Music","Video"],a:1}
],

math: [
{q:"2+2?",o:["3","4","5","6"],a:1},
{q:"5x3?",o:["10","15","20","25"],a:1},
{q:"Square of 5?",o:["10","20","25","30"],a:2},
{q:"10/2?",o:["3","4","5","6"],a:2},
{q:"7-2?",o:["4","5","6","7"],a:1}
]

};

let quiz = [];
let index = 0;
let score = 0;
let time = 15;
let timer;

function startQuiz() {
  const topic = document.getElementById("topicSelect").value;
  quiz = data[topic];
  index = 0;
  score = 0;
  loadQuestion();
}

function loadQuestion() {
  clearInterval(timer);
  time = 15;
  startTimer();

  let q = quiz[index];

  let html = `
    <div class="timer">Time: ${time}s</div>
    <div class="progress">
      <div class="progress-bar" style="width:${((index+1)/quiz.length)*100}%"></div>
    </div>
    <h2>${q.q}</h2>
  `;

  q.o.forEach((opt,i)=>{
    html += `<div class="option" onclick="selectAnswer(${i},this)">${opt}</div>`;
  });

  html += `<button onclick="next()">Next</button>`;

  document.getElementById("quizBox").innerHTML = html;
}

function selectAnswer(i,el){
  let correct = quiz[index].a;
  let options = document.querySelectorAll(".option");

  options.forEach(o=>o.onclick=null);

  if(i===correct){
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    options[correct].classList.add("correct");
  }
}

function next(){
  index++;
  if(index>=quiz.length){
    document.getElementById("quizBox").innerHTML = `
      <h2>Quiz Finished 🎉</h2>
      <p>Your Score: ${score}/${quiz.length}</p>
    `;
    return;
  }
  loadQuestion();
}

function startTimer(){
  timer = setInterval(()=>{
    time--;
    document.querySelector(".timer").innerText = "Time: " + time + "s";
    if(time===0){
      clearInterval(timer);
      next();
    }
  },1000);
}

</script>

</body>
</html>
