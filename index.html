<!DOCTYPE html>
<html>
<head>
  <title>Advanced Quiz App</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #334155;
      padding: 20px;
      border-radius: 15px;
    }

    .option {
      background: #475569;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .option:hover { background: #64748b; }

    .correct { background: green; }
    .wrong { background: red; }

    button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
    }

    .progress {
      height: 10px;
      background: #475569;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 10px;
      background: #22c55e;
      width: 0%;
    }
  </style>
</head>

<body>

<h1>🧠 Topic-Based Quiz App</h1>

<div class="container">

<select id="topicSelect">
  <option value="html">HTML Quiz</option>
  <option value="css">CSS Quiz</option>
  <option value="js">JavaScript Quiz</option>
  <option value="gk">General Knowledge</option>
  <option value="math">Math Quiz</option>
</select>
  <option value="html">HTML Quiz</option>
  <option value="css">CSS Quiz</option>
  <option value="js">JavaScript Quiz</option>
</select>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quizBox"></div>

</div>

<script>

const data = {
  const data = {

  html: [
    { q: "HTML stands for?", o: ["Hyper Text Markup Language","High Tech","Home Tool","None"], a: 0 },
    { q: "Tag for paragraph?", o: ["p","h1","div","span"], a: 0 },
    { q: "Heading tag?", o: ["h1","p","div","body"], a: 0 },
    { q: "Image tag?", o: ["img","pic","image","src"], a: 0 },
    { q: "Link tag?", o: ["a","link","href","url"], a: 0 }
  ],

  css: [
    { q: "CSS used for?", o: ["Styling","Logic","DB","None"], a: 0 },
    { q: "Color property?", o: ["color","bg","style","font"], a: 0 },
    { q: "Background color?", o: ["background","bgcolor","color","style"], a: 0 },
    { q: "Font size property?", o: ["font-size","size","text","font"], a: 0 },
    { q: "Border property?", o: ["border","line","edge","frame"], a: 0 }
  ],

  js: [
    { q: "JS is?", o: ["Language","DB","Tool","None"], a: 0 },
    { q: "Function keyword?", o: ["func","function","def","method"], a: 1 },
    { q: "Variable keyword?", o: ["var","let","const","All"], a: 3 },
    { q: "JS runs in?", o: ["Browser","Server","Both","None"], a: 2 },
    { q: "Alert function?", o: ["alert()","msg()","print()","show()"], a: 0 }
  ],

  gk: [
    { q: "Capital of India?", o: ["Delhi","Mumbai","Pune","Chennai"], a: 0 },
    { q: "National animal?", o: ["Lion","Tiger","Elephant","Dog"], a: 1 },
    { q: "Largest planet?", o: ["Earth","Mars","Jupiter","Venus"], a: 2 },
    { q: "Water formula?", o: ["H2O","CO2","O2","NaCl"], a: 0 },
    { q: "Sun is a?", o: ["Planet","Star","Galaxy","Moon"], a: 1 }
  ],

  math: [
    { q: "5 + 3 = ?", o: ["6","7","8","9"], a: 2 },
    { q: "10 - 4 = ?", o: ["5","6","7","8"], a: 1 },
    { q: "2 × 6 = ?", o: ["10","12","14","16"], a: 1 },
    { q: "9 ÷ 3 = ?", o: ["2","3","4","5"], a: 1 },
    { q: "Square of 4?", o: ["8","12","16","20"], a: 2 }
  ]

};

let quiz = [];
let index = 0;
let score = 0;

function startQuiz() {
  const topic = document.getElementById("topicSelect").value;
  quiz = data[topic];
  index = 0;
  score = 0;
  loadQuestion();
}

function loadQuestion() {
  let q = quiz[index];

  let html = `
    <div class="progress">
      <div class="progress-bar" style="width:${((index+1)/quiz.length)*100}%"></div>
    </div>
    <h2>${q.q}</h2>
  `;

  q.o.forEach((opt,i)=>{
    html += `<div class="option" onclick="selectAnswer(${i},this)">${opt}</div>`;
  });

  html += `<button onclick="next()">Next</button>`;

  document.getElementById("quizBox").innerHTML = html;
}

function selectAnswer(i,el) {
  let correct = quiz[index].a;
  let options = document.querySelectorAll(".option");

  options.forEach(o=>o.onclick=null);

  if(i===correct){
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    options[correct].classList.add("correct");
  }
}

function next() {
  index++;
  if(index>=quiz.length){
    document.getElementById("quizBox").innerHTML = `
      <h2>Finished 🎉</h2>
      <p>Score: ${score}/${quiz.length}</p>
    `;
    return;
  }
  loadQuestion();
}

</script>

</body>
</html>
